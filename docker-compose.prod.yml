services:
  docforge:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"  # Map to port 8000 because port 80 is already in use by Nginx/other services
    environment:
      - AI_BASE_URL=https://ai.sumopod.com/v1
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL=MiniMax-M2.7-highspeed
      - MAX_TOKENS=16000
      - TEMPERATURE=0.7
      - RATE_LIMIT_PER_MINUTE=60  # Higher limit for production
      - MAX_FILE_SIZE=500000
      - MAX_FILES=100
      - CORS_ORIGINS=*
      - LOG_LEVEL=INFO
    restart: unless-stopped
